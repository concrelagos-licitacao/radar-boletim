name: Scraper PNCP (Concrelagos)

# Cron schedule UTC. Horário Brasília = UTC-3.
# A cada 2h no horário comercial BR (06h–18h Brasília = 09h–21h UTC), 7 execuções/dia.
# Editais saem ao longo do dia útil; rodar mais vezes acha a licitação mais cedo.
# JANELA_DIAS=3 garante sobreposição (nada escapa entre rodadas; dedup evita repetir).
# Custo: ~7×5min = 35 min/dia ≈ 1.050 min/mês (+ keep-alive ~450) < cota grátis 2.000.
on:
  schedule:
    - cron: '0 9,11,13,15,17,19,21 * * *'
  workflow_dispatch:    # permite rodar manualmente pelo botão "Run workflow"
    inputs:
      data_inicial:
        description: 'Data inicial (YYYY-MM-DD) — deixe vazio para usar JANELA_DIAS'
        required: false
        default: ''
      data_final:
        description: 'Data final (YYYY-MM-DD) — deixe vazio para usar JANELA_DIAS'
        required: false
        default: ''

concurrency:
  group: scraper
  cancel-in-progress: false   # se um run estiver rodando, novo run espera (não cancela)

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Credenciais via GitHub Secrets (Settings → Secrets and variables → Actions)
      GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
      GOOGLE_SHEETS_CREDENTIALS_PATH: ./credenciais/service_account.json
      # Configuração de produção (ignora PNCP_DATA_INICIAL/FINAL e usa janela relativa)
      # Janela de 3 dias com sobreposição entre as 3 execuções diárias: garante que
      # nenhuma licitação escape entre rodadas (a dedup por número de controle evita repetição).
      JANELA_DIAS: '3'
      PNCP_MAX_PAGINAS: '50'
      PNCP_TIMEOUT_S: '60'
      PNCP_RETRY_COUNT: '2'
      HAVERSINE_AJUSTE_FATOR: '1.0'
      # Enriquecimento por itens: consulta endpoint de itens para editais genéricos (score=1)
      PNCP_BUSCAR_ITENS: 'true'
      PNCP_ITENS_MAX: '100'
      # Captura SEM corte de valor (0 = pega tudo). O filtro de valor é feito na TELA
      # (app.py), para nunca jogar fora uma licitação na coleta.
      VALOR_MINIMO_GERAL:    '0'
      VALOR_MINIMO_PEDREIRA: '0'
      # Notificações por e-mail (configure os 3 Secrets abaixo no GitHub)
      NOTIFICACAO_EMAIL_DE:    ${{ secrets.NOTIFICACAO_EMAIL_DE }}
      NOTIFICACAO_EMAIL_SENHA: ${{ secrets.NOTIFICACAO_EMAIL_SENHA }}
      NOTIFICACAO_EMAIL_PARA:  ${{ secrets.NOTIFICACAO_EMAIL_PARA }}
      PYTHONIOENCODING: 'utf-8'
      # Backfill manual: preenchidos pelo workflow_dispatch inputs
      PNCP_DATA_INICIAL: ${{ github.event.inputs.data_inicial }}
      PNCP_DATA_FINAL:   ${{ github.event.inputs.data_final }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restaurar Service Account JSON (do GitHub Secret)
        run: |
          mkdir -p credenciais
          cat > credenciais/service_account.json <<'EOF'
          ${{ secrets.SERVICE_ACCOUNT_JSON }}
          EOF
          # Validação rápida
          python -c "import json; d=json.load(open('credenciais/service_account.json')); print('SA project:', d['project_id'])"

      - name: Rodar scraper
        run: python scraper.py

      - name: Upload do log (se existir)
        if: always()    # roda mesmo se o scraper falhar
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: logs/*.log
          retention-days: 30

      - name: Limpar Service Account (segurança)
        if: always()
        run: rm -f credenciais/service_account.json
