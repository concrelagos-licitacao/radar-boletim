name: Keep-Alive Streamlit

# Pinga o app a cada 30 min para evitar que o Streamlit Community Cloud
# hiberne por inatividade. Cobre das 06h às 21h (Brasília) = 09h–00h UTC.
# Custo: ~30 runs/dia × 0.5 min ≈ 450 min/mês (+ 450 do scraper = 900/2000).

on:
  schedule:
    - cron: '*/30 9-23 * * *'   # 09h–23h UTC = 06h–20h Brasília
  workflow_dispatch:              # permite rodar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Streamlit app
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://concrelagos-intelligence-viynfmh4nlzrfjdktekn2f.streamlit.app/)
          echo "HTTP status: $STATUS"
          # 200 = acordado, 302 = redirect (também acordado), outros = aviso
          if [[ "$STATUS" != "200" && "$STATUS" != "302" ]]; then
            echo "Aviso: status inesperado $STATUS (app pode estar inicializando)"
          fi
