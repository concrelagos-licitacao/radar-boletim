name: Boletim Licitacoes

on:
  schedule:
    - cron: '0 10 * * *'   # 07:00 BRT (UTC-3) todos os dias
    - cron: '0 20 * * *'   # 17:00 BRT (UTC-3) todos os dias
  workflow_dispatch:         # botao "Run workflow" manual no GitHub

permissions:
  contents: write

jobs:
  boletim:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Gravar credenciais Google
        run: |
          mkdir -p credenciais
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credenciais/service_account.json

      - name: Rodar radar.py
        env:
          GOOGLE_SHEETS_CREDENTIALS_PATH: ./credenciais/service_account.json
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          HAVERSINE_AJUSTE_FATOR: '1.0'
        run: python radar.py

      - name: Enviar boletim por e-mail
        env:
          GOOGLE_SHEETS_CREDENTIALS_PATH: ./credenciais/service_account.json
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
        run: python boletim_email.py

      - name: Gerar site (GitHub Pages)
        env:
          GOOGLE_SHEETS_CREDENTIALS_PATH: ./credenciais/service_account.json
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python gerar_site.py

      - name: Limpar credenciais
        if: always()
        run: rm -f credenciais/service_account.json

      - name: Commit do site
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(site): atualiza boletins [skip ci]"
          file_pattern: 'docs/'
